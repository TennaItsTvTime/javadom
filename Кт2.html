<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Котики ищут дом</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #a18cd1, #fbc2eb);
            min-height: 100vh;
            padding: 30px 15px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            margin-bottom: 25px;
            font-size: 2.5rem;
        }

        .filters {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 30px;
        }

        .filter-btn {
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(5px);
            border: 2px solid white;
            color: white;
            padding: 10px 22px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .filter-btn:hover {
            background: white;
            color: #7b5ea7;
        }

        .filter-btn.active {
            background: white;
            color: #7b5ea7;
            border-color: #7b5ea7;
        }

        .cats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .cat-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .cat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 18px 35px rgba(0,0,0,0.3);
        }

        .cat-card.fav-card {
            border: 3px solid gold;
            box-shadow: 0 0 20px rgba(255,215,0,0.6);
        }

        .cat-img {
            width: 100%;
            height: 240px;
            object-fit: cover;
        }

        .cat-body {
            padding: 18px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .cat-name {
            font-size: 1.7rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .fav-badge {
            background: linear-gradient(45deg, #ffd700, #ffaa00);
            color: #333;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .cat-age {
            color: #666;
            font-size: 1.05rem;
            margin-bottom: 10px;
        }

        .cat-desc {
            color: #555;
            line-height: 1.5;
            font-size: 0.95rem;
            flex-grow: 1;
            margin-bottom: 12px;
        }

        .cat-rate {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1.1rem;
            color: #ffaa00;
        }

        .rate-num {
            font-weight: bold;
            color: #333;
            margin-left: 4px;
        }

        .empty-msg {
            text-align: center;
            color: white;
            font-size: 1.5rem;
            grid-column: 1 / -1;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐱 Котики, которые ищут дом</h1>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">Все</button>
            <button class="filter-btn" data-filter="favourite">❤️ Любимчики</button>
            <button class="filter-btn" data-filter="young">🐣 Молодые (≤2 года)</button>
            <button class="filter-btn" data-filter="highrate">⭐ Рейтинг ≥ 9</button>
        </div>

        <div class="cats-grid" id="catsContainer"></div>
    </div>

    <script>
        const cats = [
            {
                "name": "Лара",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2021-09/167200DD-A44F-4845-8D4D-ACCFC180165A.jpeg",
                "age": 8,
                "rate": 7,
                "favourite": false,
                "description": "Лара – шотландская вислоухая, у нее остеохондродисплазия. Лара спокойная, очень ласковая и контактная. Болезнь не лечится и специального ухода не нужно.",
                "id": 1
            },
            {
                "name": "Базиль",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/064AEBCB-45EC-4CE7-AB13-C65F10F00B7B.jpeg",
                "age": 2,
                "rate": 10,
                "favourite": false,
                "description": "Внимательный, активный и ласковый. Любит играть, катать мяч, и мурчать на пледе рядом с людьми! Прилично воспитан, приучен к лотку. Вакцинирован, имеет ветеринарный паспорт.",
                "id": 2
            },
            {
                "name": "Риш",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/_DM34706.JPG",
                "age": 1,
                "rate": 10,
                "favourite": true,
                "description": "Риш любит лесенки, канаты. Очень активный и дружелюбный кот. Риш полностью здоров, привит, кастрирован. Использует лоточек и очень аккуратен.",
                "id": 3
            },
            {
                "name": "Элли",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/1_25.jpg",
                "age": 4,
                "rate": 8,
                "favourite": false,
                "description": "Элли обладает мягким и добрым характером. Очень любит всевозможные лакомства и вкусно покушать. Не доверяет людям, потребуется время, чтобы стать ей другом. Приучена к лотку и когтеточке",
                "id": 4
            },
            {
                "name": "Чарли",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/%D0%BB%D0%B5%D0%B2%D0%B83_%D0%B0%D0%BB%D0%B5%D0%BA%D1%81.jpg",
                "age": 1,
                "rate": 8,
                "favourite": false,
                "description": "Чёрно-белый юный котофилософ очень любит размышлять и быть наедине. Пока что не доверяет людям, не агрессивный. Ладит с другими животными, приучен к лотку и когтеточке",
                "id": 5
            },
            {
                "name": "Стефани",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/4_30.jpg",
                "age": 6,
                "rate": 9,
                "favourite": false,
                "description": "Прелестная Стефани – трогательная, добродушная и очень-очень общительная девочка как никто другой нуждается в заботе и любви. Приучена к лотку и когтеточке",
                "id": 6
            },
            {
                "name": "Дуся",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-02/B1444207-6EE3-4BA4-97F7-2F9666AE2F63.jpeg",
                "age": 1,
                "rate": 9,
                "favourite": false,
                "description": "Дусеньке около 1 года с небольшим, здорова, привита, стерилизована. Лоточек и когтеточку знает прекрасно. Очень общительная и нежная, хочет постоянного внимания.",
                "id": 7
            },
            {
                "name": "Бруно",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/IMG-20211223-WA0049.jpg",
                "age": 1,
                "rate": 10,
                "favourite": false,
                "description": "Очаровательный активный кот Бруно, находится в постоянном движении! Очаровательный и ласковый кот. Приучен к лотку, ладит с другими котами, привит.",
                "id": 8
            },
            {
                "name": "Лара",
                "img_link": "https://www.friendforpet.ru/api/sites/default/files/2022-01/%D1%81%D0%B2%D0%B5%D1%82%D0%BB%D1%8F%D1%87%D0%BE%D0%BA4_%D0%B0%D0%BB%D0%B5%D0%BA%D1%81.jpg",
                "age": 1,
                "rate": 9,
                "favourite": true,
                "description": "Немного боязливый, но очень добрый и нежный кот Светлячок. Приучен к лотку и когтеточке, ладит с детьми, привит. Станет вам хорошим другом",
                "id": 9
            }
        ];

        function getYearWord(age) {
            if (age % 10 === 1 && age % 100 !== 11) return 'год';
            if ([2,3,4].includes(age % 10) && ![12,13,14].includes(age % 100)) return 'года';
            return 'лет';
        }

        function createCatCard(cat) {
            const card = document.createElement('div');
            card.className = 'cat-card';
            if (cat.favourite) card.classList.add('fav-card');

            let starsHtml = '';
            for (let i = 0; i < cat.rate; i++) {
                starsHtml += '⭐';
            }

            card.innerHTML = `
                <img src="${cat.img_link}" alt="${cat.name}" class="cat-img">
                <div class="cat-body">
                    <div class="cat-name">
                        ${cat.name}
                        ${cat.favourite ? '<span class="fav-badge">❤️ любимчик</span>' : ''}
                    </div>
                    <div class="cat-age">🎂 ${cat.age} ${getYearWord(cat.age)}</div>
                    <div class="cat-desc">${cat.description}</div>
                    <div class="cat-rate">
                        <span>Рейтинг:</span> ${starsHtml}
                        <span class="rate-num">${cat.rate}/10</span>
                    </div>
                </div>
            `;
            return card;
        }

        function renderCats(filter = 'all') {
            const container = document.getElementById('catsContainer');
            container.innerHTML = '';

            let catsToShow;
            if (filter === 'favourite') {
                catsToShow = cats.filter(cat => cat.favourite);
            } else if (filter === 'young') {
                catsToShow = cats.filter(cat => cat.age <= 2);
            } else if (filter === 'highrate') {
                catsToShow = cats.filter(cat => cat.rate >= 9);
            } else {
                catsToShow = cats;
            }

            if (catsToShow.length === 0) {
                container.innerHTML = '<div class="empty-msg">🐾 По этому фильтру котиков нет</div>';
                return;
            }

            catsToShow.forEach(cat => {
                const card = createCatCard(cat);
                container.appendChild(card);
            });
        }

        function setupFilters() {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    const filter = btn.getAttribute('data-filter');
                    renderCats(filter);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderCats('all');
            setupFilters();
        });
    </script>
</body>
</html>
