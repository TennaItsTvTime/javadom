<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpaceX - Технологии</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background-color: #000;
            color: #fff;
        }

        header {
            background-color: rgba(0, 0, 0, 0.9);
            padding: 20px 50px;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 3px;
            color: #fff;
            text-decoration: none;
        }

        .logo:hover {
            color: #00aaff;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-size: 16px;
            transition: color 0.3s;
        }

        nav a:hover {
            color: #00aaff;
        }

        .tech-page {
            padding: 120px 50px 50px;
        }

        h1 {
            text-align: center;
            font-size: 48px;
            margin-bottom: 50px;
            color: #00aaff;
        }

        .tech-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .tech-card {
            background-color: #111;
            border-radius: 10px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .tech-card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 30px rgba(0, 170, 255, 0.3);
        }

        .tech-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #003366, #001a33);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            transition: all 0.3s;
        }

        .tech-card:hover .tech-image {
            background: linear-gradient(135deg, #004080, #003366);
        }

        .tech-info {
            padding: 20px;
        }

        .tech-info h3 {
            color: #00aaff;
            margin-bottom: 10px;
        }

        .tech-info p {
            color: #aaa;
            line-height: 1.5;
        }

        .progress-bar-container {
            margin-top: 15px;
            background-color: #222;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: #00aaff;
            border-radius: 4px;
            transition: width 1.5s;
        }

        .slider {
            position: relative;
            max-width: 800px;
            margin: 50px auto;
            overflow: hidden;
            border-radius: 10px;
        }

        .slider-container {
            display: flex;
            transition: transform 0.5s;
        }

        .slide {
            min-width: 100%;
            padding: 40px;
            background-color: #111;
            text-align: center;
        }

        .slide h3 {
            font-size: 28px;
            color: #00aaff;
            margin-bottom: 15px;
        }

        .slider-nav {
            display: flex;
            justify-content: center;
            margin-top: 20px;
            gap: 10px;
        }

        .slider-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #333;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .slider-dot.active {
            background-color: #00aaff;
        }

        .slider-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background-color: rgba(0, 170, 255, 0.5);
            color: #fff;
            border: none;
            padding: 15px;
            cursor: pointer;
            font-size: 20px;
            z-index: 10;
            transition: background-color 0.3s;
        }

        .slider-btn:hover {
            background-color: rgba(0, 170, 255, 0.8);
        }

        .prev-btn {
            left: 0;
            border-radius: 0 5px 5px 0;
        }

        .next-btn {
            right: 0;
            border-radius: 5px 0 0 5px;
        }

        .zoom-text {
            font-size: 18px;
            transition: transform 0.2s;
            display: inline-block;
        }

        .counter {
            text-align: center;
            font-size: 24px;
            margin: 30px 0;
        }

        .counter span {
            color: #00aaff;
            font-size: 36px;
            font-weight: bold;
        }

        footer {
            background-color: #0a0a0a;
            padding: 30px;
            text-align: center;
            border-top: 1px solid #1a1a1a;
        }
    </style>
</head>
<body>

        <a href="index.html" class="logo">SPACEX</a>
        <nav>
            <a href="index.html">Г
