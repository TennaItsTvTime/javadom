<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Слайдер</title>
    <style>
        * {
            user-select: none;
        }
        body {
            background: #eef2f7;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: system-ui, 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .slider-container {
            background: white;
            border-radius: 40px;
            padding: 30px 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 500px;
            max-width: 90vw;
        }
        .slider {
            position: relative;
            height: 8px;
            background: #cbd5e1;
            border-radius: 10px;
            cursor: pointer;
            margin: 40px 0 20px;
        }
        .slider-fill {
            position: absolute;
            height: 100%;
            background: #3b82f6;
            border-radius: 10px;
            width: 0%;
            pointer-events: none;
        }
        .slider-thumb {
            position: absolute;
            width: 24px;
            height: 24px;
            background: white;
            border: 2px solid #3b82f6;
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            cursor: grab;
            z-index: 2;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .slider-thumb:active {
            cursor: grabbing;
        }
        .value-over-thumb {
            position: absolute;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            font-size: 14px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
            pointer-events: none;
        }
    </style>
</head>
<body>
<div class="slider-container">
    <div class="slider" id="track">
        <div class="slider-fill" id="fill"></div>
        <div class="slider-thumb" id="thumb">
            <div class="value-over-thumb" id="thumbValue">0</div>
        </div>
    </div>
</div>
<script>
    (function(){
        const track = document.getElementById('track');
        const thumb = document.getElementById('thumb');
        const fill = document.getElementById('fill');
        const valueLabel = document.getElementById('thumbValue');
        
        let min = 0, max = 100, value = 50;
        let dragging = false;
        
        function updateUI() {
            let percent = (value - min) / (max - min) * 100;
            percent = Math.min(100, Math.max(0, percent));
            const trackWidth = track.getBoundingClientRect().width;
            const leftPos = (percent / 100) * trackWidth;
            thumb.style.left = `${leftPos}px`;
            fill.style.width = `${percent}%`;
            const intVal = Math.round(value);
            valueLabel.textContent = intVal;
        }
        
        function setValueFromX(clientX) {
            const rect = track.getBoundingClientRect();
            let offset = clientX - rect.left;
            offset = Math.min(rect.width, Math.max(0, offset));
            let percent = offset / rect.width;
            let newVal = min + percent * (max - min);
            newVal = Math.min(max, Math.max(min, newVal));
            if (Math.abs(value - newVal) > 0.01) {
                value = newVal;
                updateUI();
            }
        }
        
        function onMouseDown(e) {
            e.preventDefault();
            dragging = true;
            setValueFromX(e.clientX);
            window.addEventListener('mousemove', onMouseMove);
            window.addEventListener('mouseup', onMouseUp);
        }
        
        function onMouseMove(e) {
            if (!dragging) return;
            e.preventDefault();
            setValueFromX(e.clientX);
        }
        
        function onMouseUp() {
            dragging = false;
            window.removeEventListener('mousemove', onMouseMove);
            window.removeEventListener('mouseup', onMouseUp);
        }
        
        function onTrackClick(e) {
            if (e.target === thumb || thumb.contains(e.target)) return;
            setValueFromX(e.clientX);
        }
        
        thumb.addEventListener('mousedown', onMouseDown);
        track.addEventListener('click', onTrackClick);
        window.addEventListener('resize', () => updateUI());
        
        value = 50;
        updateUI();
    })();
</script>
</body>
</html>
